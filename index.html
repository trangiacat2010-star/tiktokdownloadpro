<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tải Video TikTok - Không Watermark</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            animation: fadeInUp 0.5s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 14px;
            color: #666;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .input-group input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }
        
        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .input-group input::placeholder {
            color: #aaa;
        }
        
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-full {
            width: 100%;
            justify-content: center;
        }
        
        .btn-download {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(245, 87, 108, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(245, 87, 108, 0); }
        }
        
        .btn-download:hover {
            transform: scale(1.05);
        }
        
        .video-info {
            display: none;
            margin-top: 25px;
            animation: fadeInUp 0.5s ease-out;
        }
        
        .video-info.show {
            display: block;
        }
        
        .info-card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }
        
        .info-card .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #667eea;
        }
        
        .info-card .details {
            flex: 1;
        }
        
        .info-card .details h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 5px;
        }
        
        .info-card .details .username {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .info-card .details .title {
            font-size: 14px;
            color: #333;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        
        .stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: #666;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 14px;
            color: #666;
        }
        
        .progress-container {
            display: none;
            margin-top: 15px;
        }
        
        .progress-container.show {
            display: block;
        }
        
        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            text-align: center;
        }
        
        .error-message {
            display: none;
            margin-top: 15px;
            padding: 14px 18px;
            background: #fff5f5;
            border: 1px solid #feb2b2;
            border-radius: 12px;
            color: #c53030;
            font-size: 14px;
            animation: fadeInUp 0.3s ease-out;
        }
        
        .error-message.show {
            display: block;
        }
        
        .success-message {
            display: none;
            margin-top: 15px;
            padding: 14px 18px;
            background: #f0fff4;
            border: 1px solid #9ae6b4;
            border-radius: 12px;
            color: #276749;
            font-size: 14px;
            animation: fadeInUp 0.3s ease-out;
        }
        
        .success-message.show {
            display: block;
        }
        
        .steps {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .step {
            flex: 1;
            text-align: center;
        }
        
        .step .number {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin: 0 auto 8px;
        }
        
        .step .label {
            font-size: 12px;
            color: #666;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
        
        @media (max-width: 480px) {
            .container { padding: 25px; }
            .input-group { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
            .steps { flex-direction: column; gap: 10px; }
            .stats { gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎵</div>
            <h1>Tải Video TikTok</h1>
            <p>Không watermark • Miễn phí • Nhanh chóng</p>
        </div>
        
        <div class="steps">
            <div class="step">
                <div class="number">1</div>
                <div class="label">Dán link video</div>
            </div>
            <div class="step">
                <div class="number">2</div>
                <div class="label">Kiểm tra thông tin</div>
            </div>
            <div class="step">
                <div class="number">3</div>
                <div class="label">Tải về máy</div>
            </div>
        </div>
        
        <div class="input-group">
            <input 
                type="text" 
                id="urlInput" 
                placeholder="Dán link video TikTok vào đây..."
                autocomplete="off"
            >
            <button class="btn btn-primary" id="getInfoBtn" onclick="getVideoInfo()">
                🔍 Kiểm tra
            </button>
        </div>
        
        <div class="loading" id="infoLoading">
            <div class="spinner"></div>
            <p class="loading-text">Đang lấy thông tin video...</p>
        </div>
        
        <div class="video-info" id="videoInfo">
            <div class="info-card">
                <img class="avatar" id="videoAvatar" src="" alt="Avatar" onerror="this.style.display='none'">
                <div class="details">
                    <h3 id="videoAuthor"></h3>
                    <div class="username" id="videoUsername"></div>
                    <div class="title" id="videoTitle"></div>
                    <div class="stats">
                        <span class="stat">⏱️ <span id="statDuration"></span></span>
                        <span class="stat">👁️ <span id="statViews"></span></span>
                        <span class="stat">❤️ <span id="statLikes"></span></span>
                        <span class="stat">💬 <span id="statComments"></span></span>
                    </div>
                </div>
            </div>
            
            <button class="btn btn-download btn-full" id="downloadBtn" onclick="downloadVideo()" style="margin-top: 20px;">
                ⬇️ Tải Video
            </button>
        </div>
        
        <div class="loading" id="downloadLoading">
            <div class="spinner"></div>
            <p class="loading-text">Đang tải video, vui lòng đợi...</p>
        </div>
        
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p class="progress-text" id="progressText">Đang tải...</p>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage">
            ✅ <span id="successText"></span>
        </div>
        
        <div class="footer">
            <p>Hỗ trợ tải video TikTok không watermark</p>
        </div>
    </div>
    
    <script>
        let currentVideoInfo = null;
        let isDownloading = false;
        
        // Firebase Cloud Function URL (sẽ tự động lấy khi deploy)
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://127.0.0.1:5001/tiktok-downloader-xxxxx/us-central1'  // Thay bằng local emulator
            : 'https://us-central1-tiktokdownloadpro.cloudfunctions.net';     // Thay YOUR_PROJECT_ID
        
        function showElement(id) { document.getElementById(id).classList.add('show'); }
        function hideElement(id) { document.getElementById(id).classList.remove('show'); }
        
        function hideAllMessages() {
            ['errorMessage', 'successMessage', 'videoInfo', 'infoLoading', 'downloadLoading', 'progressContainer']
                .forEach(id => hideElement(id));
        }
        
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        function formatDuration(seconds) {
            if (!seconds) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function showError(message) {
            hideAllMessages();
            document.getElementById('errorMessage').textContent = '❌ ' + message;
            showElement('errorMessage');
        }
        
        function showSuccess(message) {
            document.getElementById('successText').textContent = message;
            showElement('successMessage');
        }
        
        async function getVideoInfo() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();
            
            if (!url) {
                showError('Vui lòng nhập link TikTok!');
                urlInput.focus();
                return;
            }
            
            if (!url.includes('tiktok.com')) {
                showError('Link không hợp lệ! Vui lòng nhập link TikTok đúng định dạng.');
                urlInput.focus();
                return;
            }
            
            hideAllMessages();
            currentVideoInfo = null;
            showElement('infoLoading');
            document.getElementById('getInfoBtn').disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/getTikTokInfo`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error || 'Không thể lấy thông tin video');
                }
                
                currentVideoInfo = data.data;
                displayVideoInfo(currentVideoInfo);
                
            } catch (error) {
                showError(error.message || 'Có lỗi xảy ra, vui lòng thử lại!');
                currentVideoInfo = null;
            } finally {
                hideElement('infoLoading');
                document.getElementById('getInfoBtn').disabled = false;
            }
        }
        
        function displayVideoInfo(info) {
            document.getElementById('videoAuthor').textContent = info.author_name;
            document.getElementById('videoUsername').textContent = '@' + info.author_unique_id;
            document.getElementById('videoTitle').textContent = info.title || 'Video không có tiêu đề';
            
            if (info.avatar) {
                document.getElementById('videoAvatar').src = info.avatar;
            }
            
            document.getElementById('statDuration').textContent = formatDuration(info.duration);
            document.getElementById('statViews').textContent = formatNumber(info.views);
            document.getElementById('statLikes').textContent = formatNumber(info.likes);
            document.getElementById('statComments').textContent = formatNumber(info.comments);
            
            showElement('videoInfo');
        }
        
        async function downloadVideo() {
            if (isDownloading) return;
            if (!currentVideoInfo) {
                showError('Vui lòng kiểm tra thông tin video trước!');
                return;
            }
            
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();
            
            isDownloading = true;
            hideElement('errorMessage');
            hideElement('successMessage');
            showElement('downloadLoading');
            document.getElementById('downloadBtn').disabled = true;
            showElement('progressContainer');
            updateProgress(10, 'Đang gửi yêu cầu...');
            
            try {
                updateProgress(30, 'Đang tải video từ máy chủ...');
                
                const response = await fetch(`${API_BASE}/downloadTikTok`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                
                updateProgress(70, 'Đang chuẩn bị file...');
                
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error || 'Không thể tải video');
                }
                
                updateProgress(90, 'Đang hoàn tất...');
                
                // Tải file từ URL được Cloud Function trả về
                setTimeout(() => {
                    window.open(data.download_url, '_blank');
                    updateProgress(100, 'Hoàn tất! Video đang được tải xuống.');
                    
                    setTimeout(() => {
                        hideElement('downloadLoading');
                        hideElement('progressContainer');
                        document.getElementById('downloadBtn').disabled = false;
                        hideElement('videoInfo');
                        showSuccess('Video đã được tải xuống! Kiểm tra thư mục Downloads của bạn.');
                    }, 500);
                }, 1000);
                
            } catch (error) {
                hideElement('downloadLoading');
                hideElement('progressContainer');
                document.getElementById('downloadBtn').disabled = false;
                showError(error.message || 'Có lỗi xảy ra khi tải video!');
            } finally {
                isDownloading = false;
            }
        }
        
        function updateProgress(percent, message) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = message + ` (${percent}%)`;
        }
        
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') getVideoInfo();
        });
        
        window.addEventListener('load', function() {
            document.getElementById('urlInput').focus();
        });
    </script>
</body>
</html>
